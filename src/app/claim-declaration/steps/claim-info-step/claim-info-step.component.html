<div class="info-form">
  <h2>{{ selectedCause?.nom ? (selectedCause?.nom) : ('claimDeclaration.detailsHeading' | translate) }}</h2>

  <form [formGroup]="form">
    <mat-card class="form-section">
      <mat-card-content>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'claimDeclaration.claimDateLabel' | translate }}</mat-label>
          <input matInput [matDatepicker]="dp" formControlName="dateEvenement" [min]="minDate" [max]="maxDate" required>
          <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
          <mat-datepicker #dp></mat-datepicker>
          <mat-error>{{ getErrorMessage('dateEvenement') }}</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'claimDeclaration.commentLabel' | translate }}</mat-label>
          <textarea matInput formControlName="description" rows="6" [placeholder]="'claimDeclaration.describeDetailedSituation' | translate"></textarea>
          <mat-error>{{ getErrorMessage('description') }}</mat-error>
        </mat-form-field>
      </mat-card-content>
    </mat-card>
  </form>
</div>
