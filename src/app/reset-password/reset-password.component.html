<div class="container-app">
<div class="login-form">
    <h2>{{ 'auth.resetTitle' | translate }}</h2>
    <form (ngSubmit)="onSubmit()" #resetPasswordForm="ngForm">
        <div class="form-group">
            <label for="password">{{ 'auth.newPassword' | translate }}</label>
            <input [(ngModel)]="password" type="password" id="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="confirmPassword">{{ 'auth.confirmPassword' | translate }}</label>
            <input [(ngModel)]="confirmPassword" type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="!resetPasswordForm.form.valid">{{ 'auth.resetButton' | translate }}</button>
    </form>
</div>
</div>
