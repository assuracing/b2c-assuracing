<mat-card class="motors-league-card">
  <mat-card-header>
    <div class="header-content">
      <mat-card-title>Motors League</mat-card-title>
      <div class="header-image">
        <img [src]="'images/motors-league.png'" alt="Motors League" class="logo" [class.logo-active]="isActive">
      </div>
    </div>
  </mat-card-header>
  
  <mat-card-content>
    
    <h3 class="guarantees-title">Vos garanties annuelles</h3>
    
    <mat-accordion class="guarantees-accordion">
      <mat-expansion-panel *ngFor="let guarantee of annualGuarantees" [class.expired]="guarantee.status === 'resili\u00e9'">
          <mat-expansion-panel-header class="guarantee-header">
            <mat-panel-title class="guarantee-title-content">
              <mat-icon class="guarantee-icon">{{ getGuaranteeIcon(guarantee.id) }}</mat-icon>
              <span class="guarantee-name">{{ guarantee.label }}</span>
              <span [class]="'status-badge status-' + guarantee.status">{{ getStatusLabel(guarantee.status) }}</span>
            </mat-panel-title>
            <mat-panel-description class="guarantee-action">
              <button *ngIf="guarantee.status === 'non-souscrit'" 
                      mat-stroked-button
                      routerLink="/motors-league"
                      (click)="$event.stopPropagation()"
                      class="action-btn subscribe-btn">
                <mat-icon>add</mat-icon>
                Souscrire
              </button>
              <button *ngIf="guarantee.status === 'resilié'" 
                      mat-stroked-button
                      routerLink="/motors-league"
                      (click)="$event.stopPropagation()"
                      class="action-btn renew-btn">
                <mat-icon>refresh</mat-icon>
                Renouveler
              </button>
            </mat-panel-description>
          </mat-expansion-panel-header>
          
          <!-- Contenu du panel -->
          <div class="guarantee-content">
            <!-- Mes avantages -->
            <mat-accordion>
              <mat-expansion-panel>
                <mat-expansion-panel-header>
                  <mat-panel-title>
                    <mat-icon style="color: #02556e;">star</mat-icon>
                    <span>Mes avantages</span>
                  </mat-panel-title>
                </mat-expansion-panel-header>
                
                <div class="benefits-section">
                  <div class="benefit-item" *ngFor="let benefit of guarantee.benefits">
                    <mat-icon>{{ benefit.icon }}</mat-icon>
                    <div class="benefit-content">
                      <h4>{{ benefit.title }}</h4>
                      <p>{{ benefit.description }}</p>
                    </div>
                  </div>
                </div>
              </mat-expansion-panel>
            </mat-accordion>
            
            <div class="contract-action" *ngIf="guarantee.contracts && guarantee.contracts.length > 0">
              <button mat-raised-button 
                      color="primary" 
                      (click)="viewContractDetails(guarantee)"
                      class="action-btn subscribe-btn">
                <mat-icon>article</mat-icon>
                {{ getContractDetailsText(guarantee.contracts.length) }}
              </button>
            </div>
          </div>
        </mat-expansion-panel>
      </mat-accordion>
  </mat-card-content>
</mat-card>
