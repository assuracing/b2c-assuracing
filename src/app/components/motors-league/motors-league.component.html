<mat-card class="motors-league-card">
  <mat-card-header>
    <div class="header-content">
      <mat-card-title>Motors League</mat-card-title>
      <div class="header-image">
        <img [src]="'images/motors-league.png'" alt="Motors League" class="logo" [class.logo-active]="isActive">
      </div>
    </div>
  </mat-card-header>
  
  <mat-card-content>
    
    <h3 class="guarantees-title">Vos garanties annuelles</h3>
    
    <div class="guarantees-grid">
      <mat-card class="guarantee-card" *ngFor="let guarantee of annualGuarantees" [class.expired]="guarantee.status === 'resilié'">
        <mat-card-header class="guarantee-card-header">
          <mat-icon class="guarantee-icon">{{ getGuaranteeIcon(guarantee.id) }}</mat-icon>
          <div class="guarantee-info">
            <h3 class="guarantee-name">{{ guarantee.label }}</h3>
            <span [class]="'status-badge status-' + guarantee.status">{{ getStatusLabel(guarantee.status) }}</span>
          </div>
        </mat-card-header>

        <mat-card-content class="guarantee-card-content">
          <div class="card-actions">
            <button *ngIf="guarantee.status === 'non-souscrit'" 
                    mat-stroked-button
                    routerLink="/motors-league"
                    (click)="$event.stopPropagation()"
                    class="action-btn subscribe-btn">
              <mat-icon>add</mat-icon>
              <span>Souscrire</span>
            </button>
            <button *ngIf="guarantee.status === 'resilié'" 
                    mat-stroked-button
                    routerLink="/motors-league"
                    (click)="$event.stopPropagation()"
                    class="action-btn renew-btn">
              <mat-icon>refresh</mat-icon>
              <span>Renouveler</span>
            </button>
            <button *ngIf="guarantee.status === 'en-cours'" 
                    mat-raised-button 
                    color="primary" 
                    (click)="viewContractDetails(guarantee)"
                    class="action-btn details-btn">
              <mat-icon>article</mat-icon>
              <span>Détails</span>
            </button>
          </div>

          <!-- Panel d'avantages -->
          <mat-accordion class="benefits-accordion" *ngIf="guarantee.benefits && guarantee.benefits.length > 0">
            <mat-expansion-panel class="benefits-panel">
              <mat-expansion-panel-header class="benefits-header">
                <mat-panel-title>
                  <mat-icon>star</mat-icon>
                  Mes avantages
                </mat-panel-title>
              </mat-expansion-panel-header>

              <div class="benefits-list">
                <div class="benefit-item" *ngFor="let benefit of guarantee.benefits">
                  <mat-icon class="benefit-icon">{{ benefit.icon }}</mat-icon>
                  <h4 class="benefit-title">{{ benefit.title }}</h4>
                </div>
              </div>
            </mat-expansion-panel>
          </mat-accordion>
        </mat-card-content>
      </mat-card>
    </div>

    
  </mat-card-content>
</mat-card>
