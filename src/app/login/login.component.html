<div class="container-app">
    <form class="login-form">
        <div class="form-group">
            <label for="username">{{ 'auth.username' | translate }}</label>
            <input [(ngModel)]="username" type="text" id="username" name="username" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="password">{{ 'auth.password' | translate }}</label>
            <input [(ngModel)]="password" type="password" id="password" name="password" class="form-control" required>
        </div>

        <div class="form-group checkbox-group">
            <label for="rememberMe" class="checkbox-label">
                <input [(ngModel)]="rememberMe" type="checkbox" id="rememberMe" name="rememberMe" class="checkbox-input">
                <span>{{ 'auth.rememberMe' | translate }}</span>
            </label>
        </div>

        <div class="actions" style="display: flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-primary" (click)="onLogin()">{{ 'auth.login' | translate }}</button>
        </div>
        
        <div class="forgot-password">
            <a href="/forgot-password">{{ 'auth.forgotPassword' | translate }}</a>
        </div>
    </form>
</div>
